name: Lint project
permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:
  merge_group:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5.0.0
      - name: Set Node.js
        uses: actions/setup-node@v6.3.0
        with:
          cache: 'pnpm'
          node-version: 20.x
      - run: pnpm install
      - run: pnpm build
      - run: pnpm lint
      - run: pnpm prettier
